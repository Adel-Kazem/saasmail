name: Bug report
description: Report a reproducible problem in saasmail
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in the sections below so we can reproduce and fix it quickly.
        **Do not** file security vulnerabilities here — see [SECURITY.md](../SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected to happen and what actually happened.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue. Include any relevant config, request payload, or UI path.
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error ...
    validations:
      required: true
  - type: input
    id: saasmail-version
    attributes:
      label: saasmail version / commit
      description: The version tag or git commit you are running (e.g. v0.1.0 or abc1234).
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Email send provider
      options:
        - Cloudflare Email Sending
        - Resend
        - Not applicable (inbound / UI only)
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, Node version, whether you're running `wrangler dev` or a deployed worker, and anything else relevant.
  - type: textarea
    id: logs
    attributes:
      label: Logs / console output
      description: Paste any relevant error messages, worker logs (`wrangler tail`), or browser console output.
      render: shell
