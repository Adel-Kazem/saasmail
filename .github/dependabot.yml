version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      radix-ui:
        patterns:
          - "@radix-ui/*"
      tiptap:
        patterns:
          - "@tiptap/*"
      codemirror:
        patterns:
          - "@codemirror/*"
          - "codemirror"
      cloudflare:
        patterns:
          - "@cloudflare/*"
          - "wrangler"
      better-auth:
        patterns:
          - "better-auth"
          - "@better-auth/*"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@playwright/*"
      dev-tooling:
        patterns:
          - "prettier"
          - "husky"
          - "lint-staged"
          - "typescript"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
